
version: "3.9"

services:
  backend:
    environment:
      APP_ENV: development
      FLASK_APP: app          # necesario para "flask run"
      FLASK_DEBUG: "1"
    volumes:
      - ./backend/app.py:/app/app.py:ro
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5000"]

  db:
    ports:
      - "5432:5432"
